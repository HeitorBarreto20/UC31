<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Formulário</title>
</head>
<body>
    <h2>Cadastro dos Alunos:</h2><br>
    <form action = "{{url_for('receberdados')}}" method="POST">

        <label>Nome Completo: </label><br>
        <input type="text" name="nome" required><br>

        <label>E-mail: </label><br>
        <input type="text" name="email" required><br>

        <label>Telefone: </label><br>
        <input type="number" name="telefone" required><br>

        <label>CPF: </label><br>
        <input type="number" name="cpf" required><br>

        <label>Cidade: </label><br>
        <input type="text" name="cidade" required><br>

        <label>Estado: </label><br>
        <input type="text" name="estado" required><br>

        <label>Curso: </label><br>
        <input type="text" name="curso" required><br>

        <label>Idade: </label><br>
        <input type="number" name="idade" required><br>

        <label>Senha: </label><br>
        <input type="text" name="senha" required><br>

        <br><button type="submit">Enviar</button>
    </form>

</body>
</html>
